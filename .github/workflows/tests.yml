name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  unit:
    name: Unit tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v5

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        enable-cache: true

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: uv sync --group dev --python ${{ matrix.python-version }}

    - name: Run unit tests
      run: |
        uv run --python ${{ matrix.python-version }} pytest tests/ --ignore=tests/integration -v --cov=src/stilt --cov-report=term-missing --cov-report=xml:coverage.xml --junitxml=junit.xml -o junit_family=legacy

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      if: ${{ matrix.os == 'ubuntu-latest' && matrix.python-version == '3.10' && !cancelled() }}
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: coverage.xml

    - name: Upload test results to Codecov
      uses: codecov/codecov-action@v5
      if: ${{ matrix.os == 'ubuntu-latest' && matrix.python-version == '3.10' && !cancelled() }}
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: junit.xml
        report_type: test_results

  integration:
    name: Integration + R-STILT tests
    runs-on: ubuntu-latest  # HYSPLIT binary is linux_x64 only

    steps:
    - uses: actions/checkout@v5

    - name: Clone stilt-tutorials met data
      run: git clone --depth 1 https://github.com/uataq/stilt-tutorials tests/stilt-tutorials

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        enable-cache: true

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: uv sync --group dev

    - name: Set up R
      uses: r-lib/actions/setup-r@v2
      with:
        r-version: 'release'

    - name: Install system dependencies for R packages
      run: sudo apt-get install -y libnetcdf-dev libgdal-dev libgeos-dev libproj-dev libssl-dev libxml2-dev

    - name: Clone uataq/stilt R source
      run: git clone --depth 1 https://github.com/uataq/stilt stilt-r-src

    - name: Populate R-STILT exe directory from bundled binaries
      run: |
        mkdir -p stilt-r-src/exe
        cp stilt-r-src/bin/linux_x64/hycs_std stilt-r-src/exe/hycs_std
        chmod +x stilt-r-src/exe/hycs_std

    - name: Build permute.so
      run: |
        cd stilt-r-src/r/src
        R CMD SHLIB permute.f90

    - name: Run integration tests (includes live R fidelity tests)
      env:
        STILT_R_DIR: ${{ github.workspace }}/stilt-r-src
      run: uv run pytest tests/integration/ -v -m integration

    - name: Run R-STILT synthetic footprint tests
      env:
        STILT_R_DIR: ${{ github.workspace }}/stilt-r-src
      run: uv run pytest tests/integration/r_stilt/test_footprint_synth.py -v

  package:
    name: Package smoke test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        enable-cache: true

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: uv sync --group dev

    - name: Install build tools
      run: python -m pip install --upgrade pip build twine

    - name: Build distributions
      run: python -m build

    - name: Check distributions
      run: twine check dist/*

    - name: Install wheel in clean environment
      run: |
        python -m venv .pkgtest
        .pkgtest/bin/pip install --upgrade pip
        .pkgtest/bin/pip install dist/*.whl

    - name: Smoke test installed package
      run: |
        .pkgtest/bin/python -c "import stilt; print(stilt.__version__)"
        .pkgtest/bin/python -m stilt --help
        .pkgtest/bin/stilt --help
